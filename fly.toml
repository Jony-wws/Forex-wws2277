# FX INVESTMENT — Fly.io app config.
# Permanent URL: https://fxinvestment.fly.dev/
app = "fxinvestment"
primary_region = "fra"  # Frankfurt — close to FX market data sources

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  TZ = "UTC"
  TEAMAGENT_STATE_DIR = "/data/state"
  TEAMAGENT_LOGS_DIR = "/data/logs"
  DASHBOARD_HOST = "0.0.0.0"
  DASHBOARD_PORT = "8080"

[[mounts]]
  source = "fxinvestment_state"
  destination = "/data"
  initial_size = "3gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # keep ≥1 alive so orchestrator computes forecasts 24/7
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"   # 1 GB — orchestrator + watchdog + dashboard fit comfortably
  cpus = 1
