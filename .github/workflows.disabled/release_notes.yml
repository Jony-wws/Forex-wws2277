name: Weekly release notes

on:
  schedule:
    - cron: "0 5 * * 1"   # Monday 05:00 UTC = 10:00 UTC+5
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for git log
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate release notes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/release_notes.py

      - name: Commit notes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/release_notes_latest.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): weekly release notes"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
