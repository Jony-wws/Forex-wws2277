name: Multi-TF backtest comparison

on:
  schedule:
    - cron: "0 6 * * *"   # daily @ 06:00 UTC = 11:00 UTC+5
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  multi_tf:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -q --upgrade pip
          pip install -q numpy pandas yfinance lightgbm scikit-learn
      - name: Run multi-TF backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/multi_tf_backtest.py || true

      - name: Commit report
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/multi_tf_latest.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(multi-tf): daily TF comparison"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
