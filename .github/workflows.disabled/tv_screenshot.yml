name: TradingView chart screenshot (top-1 pair)

on:
  schedule:
    - cron: "12 0,5,10,15,20 * * *"   # 7 minutes after cycle_5h
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  shoot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -q playwright
          playwright install --with-deps chromium
      - name: Login to TradingView (Android Chrome UA)
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: python scripts/tv_login.py || true

      - name: Take chart screenshot for top-1 pair
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: python scripts/tv_screenshot.py || true

      - name: Commit screenshot
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/tv/*.png 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(tv): top-1 chart screenshot"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
