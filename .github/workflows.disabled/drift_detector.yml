name: ML drift detector

on:
  schedule:
    - cron: "30 */5 * * *"   # 30m past each cycle, after cycle_5h finishes
  workflow_dispatch: {}
  push:
    branches:
      - main
      - "devin/**"
    paths:
      - "state/cycle_history.json"
      - "scripts/drift_detector.py"

permissions:
  contents: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q numpy
      - run: python scripts/drift_detector.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit drift report
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/drift_latest.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(drift): ML drift detection report"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
