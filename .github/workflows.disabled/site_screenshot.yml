name: Live site screenshot

on:
  schedule:
    - cron: "10 0,5,10,15,20 * * *"   # every 5h, 5min after cycle_5h
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  shoot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -q playwright
          playwright install --with-deps chromium
      - name: Take screenshot
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python scripts/site_screenshot.py

      - name: Commit screenshot
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/site/*.png 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(screenshot): live site snapshot"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
