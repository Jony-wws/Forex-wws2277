name: ForexFactory news watcher

# Watches ForexFactory RSS for high-impact events.
# Alerts via Telegram ~2 hours before each red-flagged release.
on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    name: Check upcoming news
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run news watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/news_watcher.py

      - name: Persist seen-events ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/news_seen.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore(news): update seen-events ledger"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed"
          fi
