name: 5-hour adaptive cycle

# Runs every 5 hours: per-pair param sweep + adaptive strategy + Telegram report.
# Telegram delivery requires repo secrets:
#   TELEGRAM_BOT_TOKEN  — bot API token
#   TELEGRAM_CHAT_ID    — destination chat id
on:
  schedule:
    # Aligned to UTC+5 (Russia) cycle boundaries:
    #   00:05 UTC+5  = 19:05 UTC (prev day)
    #   05:05 UTC+5  = 00:05 UTC
    #   10:05 UTC+5  = 05:05 UTC
    #   15:05 UTC+5  = 10:05 UTC
    #   20:05 UTC+5  = 15:05 UTC
    - cron: "5 19,0,5,10,15 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main
      - "devin/**"
    paths:
      - "scripts/cycle_5h.py"
      - ".github/workflows/cycle_5h.yml"

permissions:
  contents: write    # so the job can commit `state/` snapshots
  pull-requests: write

jobs:
  cycle:
    name: 5h adaptive cycle on 28 pairs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q numpy pandas yfinance lightgbm scikit-learn

      - name: Run 5h adaptive cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/cycle_5h.py 2>&1 | tee cycle_log.txt

      - name: Generate TradingView Pine script (auto-strategy)
        if: always()
        run: |
          python scripts/generate_pine.py || true

      - name: Currency strength heatmap + convergence alert
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/currency_strength.py || true

      - name: Detect strategy degradation (3 cycles in a row)
        if: always()
        run: |
          python scripts/auto_fix_degraded.py || true

      - name: Append report to job summary
        if: always()
        run: |
          if [ -f reports/cycle_5h_latest.md ]; then
            cat reports/cycle_5h_latest.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-5h-report
          path: |
            reports/cycle_5h_latest.md
            state/cycle_*.json
            state/baseline_7d.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit state back to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # state/ is in .gitignore, but the cycle history files are
          # intentional repo state — force-add them explicitly so they
          # survive across CI runs and feed walk-forward / 24h aging.
          git add -f \
            state/cycle_latest.json \
            state/baseline_7d.json \
            state/strategy_memory.json \
            state/cycle_*.json 2>/dev/null || true
          git add -f reports/cycle_5h_latest.md \
                     reports/currency_strength_latest.md \
                     reports/degradation_fix.md \
                     tradingview/auto_best_strategy.pine 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "chore(cycle): 5h cycle snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi

      - name: Comment report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const body = fs.readFileSync('reports/cycle_5h_latest.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            } catch (e) {
              console.log('No report file to post:', e.message);
            }
