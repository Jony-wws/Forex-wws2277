name: SNIPER backtest

# Walk-forward backtest of the SNIPER V1.0 brain across 28 pairs and the
# last ~2 years of 1h data (Yahoo Finance cap). Runs once a day because
# the result is statistically stable over short windows and each run
# downloads ~28 × 3 = 84 timeseries from yfinance.
#
# Outputs:
#   reports/sniper_backtest.json   — full breakdown, consumed by the site
#   GITHUB_STEP_SUMMARY            — human preview in the Actions UI

on:
  schedule:
    # Daily 02:00 UTC (07:00 UTC+5). Spaced from refresh_data cron.
    - cron: "0 2 * * *"
  # Also run on any push that touches the brain/backtest so we
  # immediately validate that we didn't regress.
  push:
    branches: [main]
    paths:
      - "app/sniper.py"
      - "app/sniper_backtest.py"
      - "app/analyzer.py"
      - "app/indicators.py"
      - "app/price_action.py"
      - ".github/workflows/sniper_backtest.yml"
  workflow_dispatch:
    inputs:
      years:
        description: "Years of data to backtest (max 2 for 1h bars)"
        required: false
        default: "2"

permissions:
  contents: write

concurrency:
  group: sniper-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          YEARS="${{ github.event.inputs.years || '2' }}"
          python -m app.sniper_backtest --years "$YEARS" \
            --out reports/sniper_backtest.json

      - name: Commit backtest JSON to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "forex-backtest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/sniper_backtest.json
          if git diff --cached --quiet; then
            echo "::notice::No changes — backtest result identical to previous run."
            exit 0
          fi
          git commit -m "chore(sniper): refresh backtest $(date -u +%Y-%m-%d)"
          # Pull with rebase in case refresh_data pushed meanwhile.
          git pull --rebase origin main || true
          git push origin HEAD:main
