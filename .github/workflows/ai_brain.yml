name: AI brain (Top-1 cycle)

# Runs the multi-layer AI brain that selects the Top-1 currency pair.
# - Full brain (28-pair breakdown) every 5 hours, aligned to UTC+5
#   trading cycles (00:00, 05:00, 10:00, 15:00, 20:00 UTC+5).
# - "Quick" refresh every 5 minutes via cron — and inside each quick
#   run we loop 5 × 60 s, so the published top1.json on the `data`
#   branch is at most ~60 s stale.  GitHub Actions cron itself
#   refuses anything finer than 5 minutes, so the inner loop is the
#   only way to hit a 1-minute cadence.
#
# Output: data/top1.json + data/brain_full.json on the `data` branch.

on:
  schedule:
    # 5-hour cycle boundaries (UTC).
    - cron: "0 19,0,5,10,15 * * *"
    # 5-minute "outer" cron — actual data writes happen every minute
    # via the inner loop below.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (full|quick)"
        required: false
        default: "full"
  push:
    branches: [main]
    paths:
      - "app/brain.py"
      - "app/edge_check.py"
      - "app/safety.py"
      - "app/smc.py"
      - "app/wyckoff.py"
      - "app/volume_profile.py"
      - "app/macro.py"
      - "app/news_brain.py"
      - "app/big_players.py"
      - "scripts/ai_brain.py"
      - "scripts/ci/data_publish.sh"
      - ".github/workflows/ai_brain.yml"

permissions:
  contents: write

concurrency:
  group: ai-brain-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  brain:
    runs-on: ubuntu-latest
    # Quick mode: 5 inner iterations × ~60 s each ≈ 5–6 min.  Full mode
    # is a one-shot run.  Bumped from 15 → 20 min to leave head-room.
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide run mode
        id: mode
        run: |
          # 5-hour cron uses "full"; everything else (5-min cron, push,
          # manual workflow_dispatch) defaults to quick mode unless
          # explicitly overridden.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'full' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "*/5 * * * *" ]; then
              echo "mode=quick" >> "$GITHUB_OUTPUT"
            else
              echo "mode=full" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Full brain run (5-hour cycle)
        if: steps.mode.outputs.mode == 'full'
        env:
          YFINANCE_TIMEOUT: "20"
        run: python scripts/ai_brain.py

      - name: Publish full snapshot
        if: steps.mode.outputs.mode == 'full'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f data/top1.json ]; then
            echo "::error::data/top1.json missing — brain produced no output"
            exit 1
          fi
          FILES=("data/top1.json")
          [ -f data/brain_full.json ] && FILES+=("data/brain_full.json")
          bash scripts/ci/data_publish.sh "brain-full" "${FILES[@]}"

      - name: Quick brain loop (5 × 60 s — minute-level refresh)
        if: steps.mode.outputs.mode == 'quick'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YFINANCE_TIMEOUT: "20"
        run: |
          set -euo pipefail
          for iter in 1 2 3 4 5; do
            start=$(date +%s)
            echo "::group::brain iter $iter / 5  ($(date -u +%H:%M:%SZ))"

            # Quick mode skips the per-pair breakdown JSON to keep the
            # per-iteration time well under 60 s.
            python scripts/ai_brain.py --quick

            if [ ! -f data/top1.json ]; then
              echo "::warning::iter $iter produced no top1.json — skipping push"
            else
              bash scripts/ci/data_publish.sh "brain-quick" data/top1.json
            fi

            echo "::endgroup::"

            # Sleep until the start of the next minute boundary, but
            # not after the final iteration.
            if [ "$iter" -lt 5 ]; then
              elapsed=$(( $(date +%s) - start ))
              remaining=$(( 60 - elapsed ))
              if [ "$remaining" -gt 0 ]; then
                echo "iter $iter took ${elapsed}s — sleeping ${remaining}s"
                sleep "$remaining"
              else
                echo "iter $iter took ${elapsed}s — no sleep, going straight to next iter"
              fi
            fi
          done

      - name: Job summary
        if: always()
        run: |
          echo "Mode: \`${{ steps.mode.outputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See [data branch](https://github.com/${{ github.repository }}/tree/data/data) for the latest snapshot." >> "$GITHUB_STEP_SUMMARY"
