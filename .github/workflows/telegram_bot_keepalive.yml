name: Telegram bot keepalive

# Cheapest free-tier way to keep the Telegram bot reachable: run the
# long-poll loop for a few minutes every 30 minutes from GitHub Actions.
# Slash commands (/start, /forex) reply with the Mini App button.
# Free-text messages go through scripts/telegram_agent.py which uses
# GitHub Models (free) to parse intent and dispatches one of the
# whitelisted workflows in this repo via the REST API.
#
# If TELEGRAM_BOT_TOKEN is missing the job still runs but exits cleanly
# so unconfigured forks don't see red builds.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes

permissions:
  # GITHUB_TOKEN needs `models: read` for the GitHub Models inference
  # endpoint used by telegram_agent.parse_intent. `contents: read` keeps
  # the rest of the job safe — the bot dispatches workflows via the
  # separate GH_DISPATCH_TOKEN PAT, NOT via GITHUB_TOKEN.
  contents: read
  models: read

concurrency:
  group: telegram-bot-keepalive
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install --quiet "requests>=2.31"

      - name: Skip if no bot token
        id: gate
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "TELEGRAM_BOT_TOKEN secret not configured — skipping bot run."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Long-poll Telegram bot for ~5 minutes
        if: steps.gate.outputs.skip == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          RUN_SECONDS: "300"
          POLL_TIMEOUT: "25"
          # GitHub Models (free) — intent parsing for free-text messages.
          # Uses the workflow-scoped GITHUB_TOKEN; no extra secret needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `actions:write` to dispatch other workflows.  When
          # missing the bot still replies but cannot launch anything.
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          # Comma-separated whitelist of chat ids allowed to drive the
          # agent.  Leave unset to allow every chat (NOT recommended for
          # public bots).
          TELEGRAM_ALLOWED_CHATS: ${{ secrets.TELEGRAM_ALLOWED_CHATS }}
        run: |
          python scripts/telegram_bot.py
