name: Deploy GitHub Pages

# Publishes the new mobile-first static dashboard at site/ to GitHub
# Pages.  Reads live data from the `data` branch via
# raw.githubusercontent at runtime — no build step, no framework, no
# server.  Pure HTML+CSS+JS so a 3G Android Chrome opens it in ~1s.
#
# URL after first successful run: https://jony-wws.github.io/Forex-wws2277/

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/gh_pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Allow a newer deploy to cancel an in-flight one so the published
  # bundle always matches the latest `main`.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site/ as Pages artefact
        run: |
          set -euo pipefail
          rm -rf _site
          cp -r site _site
          # Tell Pages to skip Jekyll — we serve raw HTML/CSS/JS.
          touch _site/.nojekyll

          # Cache-busting: stamp the build into the <script src> so a
          # new deploy always invalidates Android-Chrome's cached app.js.
          # We use the commit SHA — short, deterministic, and unique per
          # deploy.  No-op-safe: if the script tag is already stamped it
          # will simply be re-stamped with the latest SHA.
          BUILD_STAMP="${GITHUB_SHA::12}"
          # Match exactly src="./app.js[?v=...]" so we don't rewrite
          # other unrelated occurrences of the string app.js.
          sed -i -E "s|src=\"\\./app\\.js(\\?v=[^\"]*)?\"|src=\"./app.js?v=${BUILD_STAMP}\"|g" _site/index.html
          # Emit a build-info file so the front-end can show the deploy
          # commit if it wants to (or you can just curl it from prod).
          printf '{"build_sha":"%s","built_at_utc":"%s"}\n' \
            "${GITHUB_SHA}" "$(date -u +%FT%TZ)" > _site/build-info.json
          ls -la _site | head

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
