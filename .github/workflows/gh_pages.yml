name: Deploy GitHub Pages

# Publishes the new mobile-first static dashboard at site/ to GitHub
# Pages.  Reads live data from the `data` branch via
# raw.githubusercontent at runtime — no build step, no framework, no
# server.  Pure HTML+CSS+JS so a 3G Android Chrome opens it in ~1s.
#
# URL after first successful run: https://jony-wws.github.io/Forex-wws2277/

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/gh_pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Allow a newer deploy to cancel an in-flight one so the published
  # bundle always matches the latest `main`.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site/ as Pages artefact
        run: |
          set -euo pipefail
          rm -rf _site
          cp -r site _site
          # Tell Pages to skip Jekyll — we serve raw HTML/CSS/JS.
          touch _site/.nojekyll
          ls -la _site | head

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
