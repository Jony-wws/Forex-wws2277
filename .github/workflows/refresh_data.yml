name: Refresh static data

# Runs the analyser + yfinance pipeline on a 5-minute cron schedule
# and writes JSON snapshots to the orphan `data` branch.  Each cron
# tick loops 5 × 60 s internally so the published data is at most
# ~60 s stale — GitHub Actions cron itself refuses anything finer
# than 5 minutes, so the inner loop is the only way to hit a
# 1-minute cadence.
#
# Per-pair bar JSONs (data/bars/*) are rebuilt on the **first**
# iteration of every cron run.  Subsequent iterations skip the bars
# (with `--no-bars`) so each iter stays well under 60 s — only
# signals.json / cycle.json / orderbooks.json / health.json get
# refreshed at the 1-minute cadence.
#
# IMPORTANT: we commit to a *dedicated* branch (not main) so that:
#   1. the main branch history stays clean;
#   2. Fly.io / other deploys don't retrigger on data-only commits;
#   3. The diff in this branch is tiny (JSON only), so "no changes"
#      runs are skipped cheaply.

on:
  schedule:
    # 5-minute "outer" cron — actual writes happen every minute via
    # the inner loop in the build step.
    - cron: "*/5 * * * *"
  # Self-trigger on any push that changes the pipeline — guarantees a
  # fresh data snapshot gets published within minutes of a deploy, even
  # before the first cron tick. (It's also the only way to seed the
  # `data` branch for the first time after merging this workflow.)
  push:
    branches: [main]
    paths:
      - "scripts/build_static_data.py"
      - "scripts/ci/data_publish.sh"
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/refresh_data.yml"
  workflow_dispatch:
    inputs:
      skip_bars:
        description: "Skip regenerating candle files on the FIRST iter too (fastest run)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  # Only one refresh at a time — otherwise two runs could race on the
  # data-branch push and force retries.
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 5 inner iterations × ~60 s each ≈ 5–6 min, but the first iter
    # (with bars) can take 3–5 min on a slow Yahoo day.  30 min gives
    # plenty of head-room.
    timeout-minutes: 30
    steps:
      - name: Checkout main (for source code + state)
        uses: actions/checkout@v4
        with:
          ref: main
          # We need state/ from main so the 5h-cycle winrate history
          # accumulates across runs.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + publish (5 × 60 s — minute-level refresh)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Harden yfinance against intermittent Yahoo 429/5xx — it
          # already retries internally, but giving it a tighter budget
          # keeps the job under timeout even on bad days.
          YFINANCE_TIMEOUT: "20"
          SKIP_BARS_INPUT: ${{ github.event.inputs.skip_bars }}
        run: |
          set -euo pipefail
          for iter in 1 2 3 4 5; do
            start=$(date +%s)
            echo "::group::refresh iter $iter / 5  ($(date -u +%H:%M:%SZ))"

            # First iteration rebuilds the heavy bars/* directory.
            # The other four iterations skip bars so they stay well
            # under 60 s and only refresh the small JSON snapshots
            # the dashboard actually polls every minute.
            if [ "$iter" = "1" ] && [ "${SKIP_BARS_INPUT:-false}" != "true" ]; then
              python scripts/build_static_data.py
            else
              python scripts/build_static_data.py --no-bars
            fi

            FILES=(data/signals.json data/cycle.json data/orderbooks.json data/health.json)
            if [ "$iter" = "1" ] && [ -d data/bars ]; then
              # Add every per-pair bar file produced this run.
              while IFS= read -r f; do FILES+=("$f"); done < <(find data/bars -type f -name '*.json')
            fi
            bash scripts/ci/data_publish.sh "data" "${FILES[@]}"

            echo "::endgroup::"

            # Pace the loop to the next minute boundary, unless this
            # was the last iteration.
            if [ "$iter" -lt 5 ]; then
              elapsed=$(( $(date +%s) - start ))
              remaining=$(( 60 - elapsed ))
              if [ "$remaining" -gt 0 ]; then
                echo "iter $iter took ${elapsed}s — sleeping ${remaining}s"
                sleep "$remaining"
              else
                echo "iter $iter took ${elapsed}s — no sleep, going straight to next iter"
              fi
            fi
          done

      - name: Job summary
        if: always()
        run: |
          echo "See [data branch](https://github.com/${{ github.repository }}/tree/data/data) for the latest snapshot." >> "$GITHUB_STEP_SUMMARY"
