name: Vector memory — refresh neighbours

# After every 5-hour cycle (workflow_run on cycle_5h.yml) — and on a
# cron fallback so the report is fresh even if the cycle workflow
# didn't fire — re-run scripts/memory_query.py to write
# reports/memory_neighbors_latest.md.  The AI reviewer / AI patcher
# reads that file and includes its content in their LLM prompt.
#
# Free Supabase tier setup: https://supabase.com/dashboard/projects.
# Required repo secrets: SUPABASE_URL, SUPABASE_KEY.  When the secrets
# are absent the script writes a placeholder report and exits 0.

on:
  workflow_run:
    workflows: ["5-hour adaptive cycle"]
    types: [completed]
  schedule:
    # Cron fallback — fires 14 minutes after every cycle boundary so we
    # always refresh the neighbours file even if the cycle workflow
    # itself was skipped (e.g. quota / outage).
    - cron: "14 19,0,5,10,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  query:
    name: Refresh memory_neighbors_latest.md
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install supabase client (optional)
        run: |
          # Optional install — memory_query.py degrades gracefully when
          # supabase-py is missing (it just writes a placeholder report).
          pip install -q "supabase>=2.0.0" || \
            echo "supabase install failed — script will skip silently"

      - name: Refresh neighbour report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scripts/memory_query.py

      - name: Append report to job summary
        if: always()
        run: |
          if [ -f reports/memory_neighbors_latest.md ]; then
            cat reports/memory_neighbors_latest.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-neighbors-latest
          path: reports/memory_neighbors_latest.md
          if-no-files-found: warn
          retention-days: 14

      - name: Commit refreshed report
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/memory_neighbors_latest.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no memory report changes to commit"
          else
            git commit -m "chore(memory): refresh neighbours $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || \
              echo "push failed (non-fatal)"
          fi
