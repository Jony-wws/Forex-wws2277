name: EUR/USD M15 backtest

# Runs the Python backtest on every push and on demand. Posts the resulting
# WR / trade-count report as a comment on the commit so we can iterate
# without having to look at logs by hand.

on:
  push:
    paths:
      - "scripts/backtest_eurusd.py"
      - "tradingview/**.pine"
      - "app/analyzer.py"
      - "app/indicators.py"
      - "app/config.py"
      - ".github/workflows/backtest.yml"
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC so we get a fresh report every morning.
    - cron: "0 7 * * *"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run EUR/USD backtest
        id: backtest
        run: |
          python scripts/backtest_eurusd.py
          echo "report_path=reports/eurusd_backtest_latest.md" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: eurusd-backtest-report
          path: reports/eurusd_backtest_latest.md
          if-no-files-found: error

      - name: Comment report on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/eurusd_backtest_latest.md', 'utf8');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body: body + '\n\n_Posted automatically by the backtest workflow._',
            });
