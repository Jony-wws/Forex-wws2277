name: Forex backtest (28 pairs + EUR/USD trend + EUR/USD MR)

# Runs three Python backtests on every push that touches the system, and
# every morning at 07:00 UTC. All three reports are posted as a single
# combined comment on any open PR for the pushed branch.
#
# 1. 28-pair full-system backtest (premium / strict / daily TOP-3)
# 2. EUR/USD M15 trend-system (★ ПРЕМИУМ / СТРОГИЙ, 5h binary)
# 3. EUR/USD M15 mean-reversion (BB+RSI extreme bounce, 1-2h binary)

on:
  push:
    paths:
      - "scripts/backtest_eurusd.py"
      - "scripts/backtest_eurusd_mr.py"
      - "scripts/backtest_28pairs.py"
      - "tradingview/**.pine"
      - "app/analyzer.py"
      - "app/indicators.py"
      - "app/config.py"
      - ".github/workflows/backtest.yml"
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC so we get a fresh report every morning.
    - cron: "0 7 * * *"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    # 28-pair download is the slow step; allow plenty of headroom.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy matplotlib

      - name: Run 28-pair full-system backtest (premium / strict / daily TOP-3)
        run: python scripts/backtest_28pairs.py

      - name: Run trend-system backtest (★ ПРЕМИУМ / СТРОГИЙ, 5h binary)
        run: python scripts/backtest_eurusd.py

      - name: Run mean-reversion backtest (BB+RSI extreme, 1-2h binary)
        run: python scripts/backtest_eurusd_mr.py

      - name: Render chart proofs (TradingView-style PNG with overlay markers)
        run: |
          for pair in EURUSD GBPUSD USDJPY AUDUSD; do
            python scripts/render_chart_proof.py "$pair" || true
          done

      - name: Upload reports artifact (markdown + json + chart PNGs)
        uses: actions/upload-artifact@v4
        with:
          name: forex-backtest-reports
          path: |
            reports/*.md
            reports/*.json
            reports/*.png
          if-no-files-found: error

      - name: Append all reports to job summary
        run: |
          echo "## 28-pair full-system backtest" >> "$GITHUB_STEP_SUMMARY"
          cat reports/28pairs_backtest_latest.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## EUR/USD trend-system backtest" >> "$GITHUB_STEP_SUMMARY"
          cat reports/eurusd_backtest_latest.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## EUR/USD mean-reversion strategy" >> "$GITHUB_STEP_SUMMARY"
          cat reports/eurusd_mr_backtest_latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment all reports on PR (when run on a push)
        if: github.event_name == 'push'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const all = fs.readFileSync('reports/28pairs_backtest_latest.md', 'utf8');
            const trend = fs.readFileSync('reports/eurusd_backtest_latest.md', 'utf8');
            const mr    = fs.readFileSync('reports/eurusd_mr_backtest_latest.md', 'utf8');
            const body  =
              '# 🎯 28-pair full-system backtest\n\n' + all +
              '\n\n---\n\n# EUR/USD trend-system\n\n' + trend +
              '\n\n---\n\n# EUR/USD mean-reversion\n\n' + mr +
              '\n\n_Posted automatically by `.github/workflows/backtest.yml`._';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
            });
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
