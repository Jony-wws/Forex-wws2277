name: EUR/USD M15 backtest

# Runs the Python backtest on every push and on demand. Posts the resulting
# WR / trade-count report as a comment on the commit so we can iterate
# without having to look at logs by hand.

on:
  push:
    paths:
      - "scripts/backtest_eurusd.py"
      - "scripts/backtest_eurusd_mr.py"
      - "tradingview/**.pine"
      - "app/analyzer.py"
      - "app/indicators.py"
      - "app/config.py"
      - ".github/workflows/backtest.yml"
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC so we get a fresh report every morning.
    - cron: "0 7 * * *"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run trend-system backtest (★ ПРЕМИУМ / СТРОГИЙ, 5h binary)
        run: python scripts/backtest_eurusd.py

      - name: Run mean-reversion backtest (BB+RSI extreme, 1-2h binary)
        run: python scripts/backtest_eurusd_mr.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: eurusd-backtest-reports
          path: reports/*.md
          if-no-files-found: error

      - name: Append both reports to job summary
        run: |
          echo "## Trend system" >> "$GITHUB_STEP_SUMMARY"
          cat reports/eurusd_backtest_latest.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Mean-reversion strategy" >> "$GITHUB_STEP_SUMMARY"
          cat reports/eurusd_mr_backtest_latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment both reports on PR (when run on a PR push)
        if: github.event_name == 'push'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const trend = fs.readFileSync('reports/eurusd_backtest_latest.md', 'utf8');
            const mr    = fs.readFileSync('reports/eurusd_mr_backtest_latest.md', 'utf8');
            const body  = '## Trend system\n\n' + trend + '\n\n---\n\n## Mean-reversion strategy\n\n' + mr +
                          '\n\n_Posted automatically by the backtest workflow._';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
            });
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
