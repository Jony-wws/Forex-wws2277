name: AVEN Capture

on:
  workflow_dispatch:
    inputs:
      pair:
        description: "Forex pair symbol (e.g. AUDUSD, USDJPY, GBPJPY)"
        required: true
        default: "AUDUSD"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Capture screenshots
        run: python scripts/aven_capture.py "${{ github.event.inputs.pair }}"

      - name: Commit screenshots
        run: |
          git config user.name "aven-bot"
          git config user.email "aven-bot@users.noreply.github.com"
          git add screenshots/
          git commit -m "AVEN capture: ${{ github.event.inputs.pair }}" || echo "nothing to commit"
          git push
          
