name: AI market narrative

# After each 5h cycle, ask GitHub Models (free) to write a short Russian
# market explanation and send it to Telegram (if configured).

on:
  workflow_run:
    workflows: ["5-hour adaptive cycle"]
    types: [completed]
  schedule:
    - cron: "15 19,0,5,10,15 * * *"   # 15 min after each cycle boundary
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  narrative:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run AI narrative
        env:
          # Primary: Cloudflare Workers AI (free Llama 3.3 70B).
          # Falls back transparently to GitHub Models when these are absent.
          CF_AI_ACCOUNT_ID: ${{ secrets.CF_AI_ACCOUNT_ID }}
          CF_AI_API_TOKEN:  ${{ secrets.CF_AI_API_TOKEN }}
          CF_AI_MODEL:      "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
          # Fallback: GitHub Models (gpt-4o-mini, free via auto-injected GITHUB_TOKEN).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o-mini
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ai_narrative.py
      - name: Append narrative to job summary
        if: always()
        run: |
          if [ -f reports/ai_narrative_latest.md ]; then
            cat reports/ai_narrative_latest.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Commit narrative
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ai_narrative_latest.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(ai-narrative): refresh market summary"
            git push origin HEAD:${GITHUB_REF#refs/heads/} || echo "push failed (non-fatal)"
          fi
