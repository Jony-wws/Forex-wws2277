name: Minute refresh (1-min data pulse)

# The user explicitly asked for the dashboard to refresh **every 1
# minute** through GitHub Actions, with a hard upper bound of 5 minutes
# between publishes.  GitHub's cron scheduler has a 5-minute minimum
# granularity AND is notoriously unreliable — entire `*/5` slots can be
# silently skipped, especially during organisation-wide high load or
# right after a push.  We have seen real-world skips of 12-20 minutes
# on this repo when relying on a 5-iteration loop.
#
# To stay inside the 5-minute publish ceiling we now use a **long-loop**
# strategy: each scheduled run pulses for 30 × 60s = 30 minutes.  Even if
# the next 5-6 cron slots are skipped (i.e. up to ~30 minutes of cron
# silence), the previous job is still pulsing every minute.  A second
# workflow (`minute_keepalive.yml`) provides an offset cron lane for
# redundancy.
#
# This complements the heavier crons:
#   - ai_brain.yml      — full 28-pair breakdown every 5h (brain_full.json)
#   - refresh_data.yml  — yfinance signals + cycle every 5 min
#
# Concurrency: the publish step has its own retry loop so it never loses
# a forecast to a race with refresh_data.yml on the same `data` branch.
# We deliberately let parallel pulse jobs from staggered crons run
# concurrently — a few extra commits per minute is acceptable; a 19-min
# silence is not.

on:
  schedule:
    # Double-cron strategy for sub-5-min publish cadence even when
    # GitHub silently drops slots.  Two `*/5` lanes, offset by 2 minutes:
    #
    #   primary:    00, 05, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55
    #   offset (+2):02, 07, 12, 17, 22, 27, 32, 37, 42, 47, 52, 57
    #
    # Each cron firing kicks off a 30-iteration pulse loop (30 minutes
    # of per-minute publishes), so worst-case publish gap drops from the
    # observed ~20 min to under 5 min — even if 5 consecutive slots are
    # skipped.  Multiple `schedule:` entries are allowed in a single
    # workflow and are treated as independent triggers.
    - cron: "*/5 * * * *"
    - cron: "2-57/5 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # Any change to the brain pipeline that influences select_top1()
      # should immediately seed a fresh `data/top1.json` rather than
      # wait ≤ 5 min for the cron to fire (GitHub's */5 cron is often
      # delayed or skipped after recent pushes).  edge_check.py gates
      # publishes — changes here can flip a pair from null to live, so
      # it belongs in the trigger set.  smc.py / wyckoff.py / macro.py /
      # news_brain.py / big_players.py all feed the seven brain layers
      # directly; safety.py governs the 5h projection veto.
      - "scripts/ai_brain.py"
      - "app/brain.py"
      - "app/edge_check.py"
      - "app/safety.py"
      - "app/smc.py"
      - "app/wyckoff.py"
      - "app/macro.py"
      - "app/news_brain.py"
      - "app/big_players.py"
      - ".github/workflows/minute_refresh.yml"

permissions:
  contents: write

concurrency:
  # Allow up to one queued job in addition to the running one.  We use a
  # per-run-id group so multiple staggered crons can run truly in
  # parallel — overlap is desirable here because it shrinks the worst-
  # case gap when GitHub silently drops a cron slot.
  group: minute-refresh-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    # 30 × 60s iterations of the long pulse loop + ~5 min of overhead
    # budget.  Hard cap at 35 min so this run definitely finishes before
    # GitHub recycles the runner, while still covering ~30 minutes of
    # cron silence end-to-end.
    timeout-minutes: 35
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pulse loop (30 × 60s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tighter yfinance budget so a stuck call can't blow the
          # 35-min job timeout.
          YFINANCE_TIMEOUT: "15"
        run: |
          set -euo pipefail
          git config user.name  "forex-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          push_top1() {
            mkdir -p /tmp/minute-out
            cp data/top1.json /tmp/minute-out/top1.json

            if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
              git fetch origin data --depth=1
              git checkout -B data origin/data
            else
              git checkout --orphan data
              git rm -rf . >/dev/null 2>&1 || true
            fi

            mkdir -p data
            cp /tmp/minute-out/top1.json data/top1.json

            git add data/top1.json
            if git diff --cached --quiet; then
              echo "::notice::No top1.json delta this minute — skipping commit."
              git checkout main
              return 0
            fi

            git commit -m "brain: minute pulse $(date -u +%Y-%m-%dT%H:%MZ)"
            # Up to 3 retries with rebase-style refetch so we never lose
            # a minute to a refresh_data.yml race.
            for attempt in 1 2 3; do
              if git push origin data; then
                git checkout main
                return 0
              fi
              echo "push attempt $attempt failed, rebasing on origin/data…"
              git fetch origin data --depth=1
              git reset --soft FETCH_HEAD
              git add data/top1.json
              git commit -m "brain: minute pulse $(date -u +%Y-%m-%dT%H:%MZ) (retry $attempt)"
              sleep 5
            done
            echo "::warning::Push failed after 3 retries — giving up this minute."
            git checkout main
            return 1
          }

          # 30 × 60s iterations.  Even if GitHub silently skips 5
          # consecutive */5 cron slots (i.e. 25 minutes of cron silence),
          # this single run is still pulsing every minute end-to-end.
          # Combined with minute_keepalive.yml's offset cron we get
          # double-coverage of every minute boundary.
          TOTAL_ITERS=30
          for i in $(seq 1 "$TOTAL_ITERS"); do
            iteration_start=$(date -u +%s)
            echo "── Minute pulse $i/$TOTAL_ITERS — $(date -u +%H:%M:%SZ) ──"

            # Quick mode = top1.json only.  No per-pair breakdown so the
            # data branch diff stays small and the push is fast.
            python scripts/ai_brain.py --quick || {
              echo "::warning::ai_brain.py quick failed on iter $i — skipping push."
              true
            }

            if [ -f data/top1.json ]; then
              push_top1 || true
            else
              echo "::warning::data/top1.json missing on iter $i."
            fi

            # Sleep the remainder of the 60-second slot.  Skip on the
            # final iteration so we don't waste compute.
            if [ "$i" != "$TOTAL_ITERS" ]; then
              elapsed=$(( $(date -u +%s) - iteration_start ))
              remaining=$(( 60 - elapsed ))
              if [ "$remaining" -gt 0 ]; then
                echo "Sleeping ${remaining}s before next pulse…"
                sleep "$remaining"
              fi
            fi
          done
