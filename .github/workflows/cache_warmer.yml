name: Yahoo Finance cache warmer

on:
  schedule:
    - cron: "20 * * * *"   # hourly @ :20
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q yfinance pandas
      - run: python scripts/cache_warmer.py
