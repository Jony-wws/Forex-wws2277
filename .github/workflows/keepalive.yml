name: keepalive
# Раз в 4 минуты пингует fly.io, чтобы машина не уходила в spin-down.
# Без этого fly.io free tier останавливает машину при простое и при первом
# запросе пользователь ждёт 30+ секунд cold-start.
on:
  schedule:
    - cron: "*/4 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping fxinvestment-ytjmvlnz.fly.dev
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "https://fxinvestment-ytjmvlnz.fly.dev/api/health")
            echo "ping #$i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "all pings failed"
          exit 1
