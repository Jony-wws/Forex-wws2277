name: Deploy to Fly.io

# Permanent deployment of the FOREX dashboard to Fly.io's free tier.
#
# Triggers: pushes to `main` that touch the application code or its
# build/deploy infra.  Manual runs via `workflow_dispatch` are also
# allowed for one-off redeploys.
#
# The workflow is fork-safe: when the `FLY_API_TOKEN` repo secret is
# missing it exits early with a `notice` annotation and a green status
# (so a fresh fork keeps a clean CI badge until the user opts in).

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "static/**"
      - "web/**"
      - "fly.toml"
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - ".github/workflows/deploy_fly.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: flyctl deploy --remote-only
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Skip silently when FLY_API_TOKEN is missing
        id: guard
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::notice::FLY_API_TOKEN secret is not set — skipping Fly.io deploy. Add it in repo Settings → Secrets and variables → Actions to enable auto-deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up flyctl
        if: steps.guard.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: flyctl deploy --remote-only
        if: steps.guard.outputs.skip != 'true'
        run: flyctl deploy --remote-only
