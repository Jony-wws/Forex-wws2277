name: AI code patcher

# Heavy-weight automation: GitHub Models reads recent winrate + the source
# of app/analyzer.py / cycle.py / config.py, then proposes ACTUAL code
# patches that adjust voting weights and gate thresholds.  The patches are
# applied locally, smoke-tested (must still import), and committed to a
# fresh branch as a PR for human review.
#
# 100% free — uses GITHUB_TOKEN against models.github.ai (no paid API).
# Safety net:
#   - max 8 changes / 200 net diff lines per run
#   - forbidden tokens (open, exec, eval, subprocess, import os) are blocked
#   - patch must keep app/* importable (smoke compile)
#   - everything goes through human-reviewed PR, never direct push

on:
  schedule:
    - cron: "0 4 * * *"   # daily 04:00 UTC = 09:00 UTC+5
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  patch:
    name: Generate analyzer patch via GitHub Models
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps for smoke compile
        run: |
          pip install -q fastapi yfinance pandas numpy slowapi

      - name: Run AI patcher
        env:
          # Primary: Cloudflare Workers AI (free Llama 3.3 70B).
          # Falls back transparently to GitHub Models when these are absent.
          CF_AI_ACCOUNT_ID: ${{ secrets.CF_AI_ACCOUNT_ID }}
          CF_AI_API_TOKEN:  ${{ secrets.CF_AI_API_TOKEN }}
          CF_AI_MODEL:      "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
          # Fallback: GitHub Models (gpt-4o-mini, free via auto-injected GITHUB_TOKEN).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o-mini
        run: |
          python scripts/ai_patcher.py

      - name: Append proposal to job summary
        if: always()
        run: |
          if [ -f reports/ai_patch_proposal.md ]; then
            cat reports/ai_patch_proposal.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open PR with AI patch
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-patch/${{ github.run_id }}
          base: main
          title: "ai(patch): GitHub Models suggested analyzer/cycle tweak"
          body-path: reports/ai_patch_proposal.md
          commit-message: "ai(patch): apply GitHub Models suggestion"
          add-paths: |
            app/analyzer.py
            app/cycle.py
            app/config.py
            reports/ai_patch_proposal.md
          delete-branch: true
          labels: ai-generated,review-required
