name: Vector memory — daily index

# Indexes every evaluated 5h forecast from state/forecasts.json into
# Supabase pgvector (`trade_memory` table) so the AI patcher / reviewer
# can later query historical analogs of the live setup.
#
# Free tier setup: https://supabase.com/dashboard/projects (500 MB
# Postgres, plenty for ~60 cycles × 5 picks). Required repo secrets:
#   SUPABASE_URL — `https://<project>.supabase.co`
#   SUPABASE_KEY — service_role key (or anon key with insert privilege).
# When the secrets are absent the script skips silently — the workflow
# never fails CI even on a fresh fork.

on:
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  index:
    name: Index winning-setup memory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install supabase client (optional)
        run: |
          # Optional install — memory_index.py skips gracefully if it fails.
          pip install -q "supabase>=2.0.0" || \
            echo "supabase install failed — script will skip silently"

      - name: Run memory indexer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scripts/memory_index.py
