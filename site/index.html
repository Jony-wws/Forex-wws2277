<!--
  FOREX dashboard — fully static, zero-install.
  - Reads JSON snapshots from the `data` branch of this repo via jsDelivr CDN.
  - Those snapshots are regenerated every 15 minutes by GitHub Actions
    (.github/workflows/refresh_data.yml) on a real ubuntu-latest runner
    with real internet access — the data is genuine Yahoo Finance, not
    simulated.
  - Vanilla JS on purpose so the page works directly from githack/jsdelivr
    with no build step and no framework runtime beyond lightweight-charts.
-->

<style>

html, body {

<script>
/* =========================================================================
 * CONFIG
 * ========================================================================= */
const REPO_OWNER = "Jony-wws";
const REPO_NAME = "Forex-wws2277";
const DATA_BRANCH = "data";

// jsDelivr with minute-level cache busting + raw.githubusercontent fallback.
// jsDelivr's CDN updates within ~10 minutes of a new commit; the
// fallback hits GitHub directly for fresher reads when the CDN is lagging.
function urls(path) {
  const bust = Math.floor(Date.now() / 60000); // new URL every minute
  return [
    `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${DATA_BRANCH}/data/${path}?t=${bust}`,
    `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${DATA_BRANCH}/data/${path}`,
  ];
}

const POLL_MS = 60000;  // 60s — data itself refreshes every 15min on the server side
const PAIRS_ALL = [
  "EURUSD","GBPUSD","USDJPY","USDCHF","AUDUSD","USDCAD","NZDUSD",
  "EURGBP","EURJPY","EURCHF","EURAUD","EURCAD","EURNZD",
  "GBPJPY","GBPCHF","GBPAUD","GBPCAD","GBPNZD",
  "AUDJPY","CADJPY","CHFJPY","NZDJPY",
  "AUDCAD","AUDCHF","AUDNZD",
  "CADCHF","NZDCAD","NZDCHF"
];
const INTERVALS = [
  { key: "15m", label: "15М" },
  { key: "1h", label: "1Ч" },
  { key: "4h", label: "4Ч" },
  { key: "1d", label: "1Д" },
];

/* =========================================================================
 * STATE
 * ========================================================================= */
const state = {
  signals: null,
  cycle: null,
  orderbooks: null,
  health: null,
  bars: {},             // `${pair}|${interval}` → BarsResponse
  lastFetchAt: null,
  firstLoadError: null,
  filter: "all",
  sort: "default",
  currentPair: null,
  currentInterval: "1h",
};

/* =========================================================================
 * ROUTING — hash-based, trivial.
 *   #/             → dashboard
 *   #/cycle        → 5h cycle
 *   #/pair/EURUSD  → pair detail
 * ========================================================================= */
function currentRoute() {
  const hash = location.hash.slice(1) || "/";
  const parts = hash.split("/").filter(Boolean);
  if (parts.length === 0) return { name: "dashboard" };
  if (parts[0] === "cycle") return { name: "cycle" };
  if (parts[0] === "pair" && parts[1]) return { name: "pair", pair: parts[1].toUpperCase() };
  return { name: "dashboard" };
}
window.addEventListener("hashchange", () => {
  window.scrollTo(0, 0);
  render();
});

/* =========================================================================
 * FETCH — try jsDelivr first, fall back to raw. Never throw on a partial
 *         failure — we show whatever we have plus a friendly warning.
 * ========================================================================= */
async function fetchJSON(path) {
  const candidates = urls(path);
  let lastErr = null;
  for (const url of candidates) {
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (err) { lastErr = err; }
  }
  throw lastErr || new Error(`Failed: ${path}`);
}

async function refresh() {
  try {
    const [signals, cycle, orderbooks, health] = await Promise.all([
      fetchJSON("signals.json").catch(e => ({ _err: e })),
      fetchJSON("cycle.json").catch(e => ({ _err: e })),
      fetchJSON("orderbooks.json").catch(e => ({ _err: e })),
      fetchJSON("health.json").catch(e => ({ _err: e })),
    ]);

    if (!signals._err) state.signals = signals;
    if (!cycle._err) state.cycle = cycle;
    if (!orderbooks._err) state.orderbooks = orderbooks;
    if (!health._err) state.health = health;

    const anyOk = [signals, cycle, orderbooks, health].some(x => !x._err);
    if (anyOk) {
      state.lastFetchAt = Date.now();
      state.firstLoadError = null;
    } else if (!state.signals) {
      state.firstLoadError = "" + signals._err;
    }
  } catch (err) {
    if (!state.signals) state.firstLoadError = "" + err;
  }
  updateHealthBadge();
  render();
}

async function fetchBars(pair, interval) {
  const key = `${pair}|${interval}`;
  // Do not re-fetch if younger than the general poll cycle.
  const cached = state.bars[key];
  if (cached && Date.now() - cached._at < POLL_MS) return cached;
  try {
    const data = await fetchJSON(`bars/${pair}-${interval}.json`);
    state.bars[key] = Object.assign(data, { _at: Date.now() });
    return state.bars[key];
  } catch (err) {
    state.bars[key] = { _at: Date.now(), bars: [], _err: "" + err };
    return state.bars[key];
  }
}

/* =========================================================================
 * FORMATTING
 * ========================================================================= */
const fmt = {
  price(pair, p) {
    if (p == null || isNaN(p)) return "—";
    return pair.includes("JPY") ? p.toFixed(3) : p.toFixed(5);
  },
  pips(v) {
    if (v == null || isNaN(v)) return "—";
    return (v > 0 ? "+" : "") + v.toFixed(1);
  },
  pct(v, d) {
    if (v == null || isNaN(v)) return "—";
    const digits = d == null ? 2 : d;
    return (v > 0 ? "+" : "") + v.toFixed(digits) + "%";
  },
  num(v, d) {
    if (v == null || isNaN(v)) return "—";
    return Number(v).toFixed(d == null ? 1 : d);
  },
  countdown(sec) {
    const s = Math.max(0, Math.floor(sec || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    return [h, m, ss].map(n => String(n).padStart(2, "0")).join(":");
  },
};

/* =========================================================================
 * SMALL RENDER HELPERS
 * ========================================================================= */
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      const v = attrs[k];
      if (v == null) continue;
      if (k === "class") node.className = v;
      else if (k === "onclick") node.addEventListener("click", v);
      else if (k === "onchange") node.addEventListener("change", v);
      else if (k === "html") node.innerHTML = v;
      else node.setAttribute(k, v);
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null || c === false) return;
      if (typeof c === "string" || typeof c === "number") node.append(String(c));
      else node.append(c);
    });
  }
  return node;
}

function sideBadge(side, confidence) {
  if (side === "BUY") return el("span", { class: "badge badge-buy" },
    "▲ BUY" + (confidence != null ? ` ${confidence}%` : ""));
  if (side === "SELL") return el("span", { class: "badge badge-sell" },
    "▼ SELL" + (confidence != null ? ` ${confidence}%` : ""));
  return el("span", { class: "badge badge-neutral" }, "—");
}

function tierBadge(tier) {
  if (tier === "PREMIUM") return el("span", { class: "badge badge-premium", title: "Премиум выбор" }, "PREMIUM");
  if (tier === "STRONG") return el("span", { class: "badge badge-strong", title: "Сильный тренд" }, "STRONG");
  return el("span", { class: "badge badge-neutral" }, "NORMAL");
}

function changeColorClass(v) {
  return v > 0 ? "color-up" : v < 0 ? "color-down" : "color-flat";
}

/* =========================================================================
 * HEALTH BADGE — shows in the header
 * ========================================================================= */
function updateHealthBadge() {
  const dot = document.getElementById("live-dot");
  const text = document.getElementById("live-text");
  const badge = document.getElementById("live-badge");

  if (state.firstLoadError && !state.signals) {
    dot.className = "live-dot offline";
    text.textContent = "OFF";
    badge.title = "Не удалось загрузить данные";
    return;
  }
  if (!state.signals) {
    dot.className = "live-dot";
    text.textContent = "…";
    return;
  }

  const updated = state.health?.updated_at_utc5 || state.signals?.updated_at;
  // Data is "fresh" if the server-side update is <= 30 min old.
  let fresh = true;
  if (state.health?.updated_at_utc) {
    const ageMs = Date.now() - Date.parse(state.health.updated_at_utc);
    fresh = ageMs < 30 * 60 * 1000;
  }
  dot.className = fresh ? "live-dot live" : "live-dot stale";
  text.textContent = fresh ? "LIVE" : "STALE";
  badge.title = `Обновлено: ${updated || "—"} · ${state.signals.scan_count ?? 0} пар · кэш 1 мин`;
}

      }, String(current?.strong_count || 0)),

  ]));

    root.append(el("div", { class: "notice" },

  }, "Топ прогнозы на 5 часов"));

      `Следующая ротация: ${current.next_cycle_utc}`));
  }

  return root;
}

function computeCountdown(cy) {
  // Server side wrote seconds_to_next_cycle at build time. Augment with
  // client clock against next_cycle_utc so the timer stays accurate
  // between 15-min refreshes.
  const iso = cy.current_cycle?.next_cycle_utc || cy.next_cycle_utc;
  if (!iso) return cy.seconds_to_next_cycle || 0;
  const parsed = Date.parse(iso.replace(" UTC", "Z").replace(" ", "T"));
  if (isNaN(parsed)) return cy.seconds_to_next_cycle || 0;
  return Math.max(0, Math.round((parsed - Date.now()) / 1000));
}

async function mountChart(pair, interval) {
  if (!window.LightweightCharts) return;
  const container = document.getElementById("chart-box");
  if (!container) return;
  container.innerHTML = ""; // clear previous chart

  const bars = await fetchBars(pair, interval);
  if (!bars || !bars.bars || bars.bars.length === 0) {
    container.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:20px;text-align:center;">Нет свечных данных для ${interval}.</div>`;
    return;
  }

  const digits = pair.includes("JPY") ? 3 : 5;
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: 320,
    layout: { background: { color: "#141b2d" }, textColor: "#8892a4", fontSize: 11 },
    grid: { vertLines: { color: "#1e2a3a" }, horzLines: { color: "#1e2a3a" } },
    rightPriceScale: { borderColor: "#1e2a3a" },
    timeScale: { borderColor: "#1e2a3a", timeVisible: true, secondsVisible: false },
    handleScale: { mouseWheel: false },
  });
  const series = chart.addCandlestickSeries({
    upColor: "#00e676", downColor: "#ff5252",
    borderUpColor: "#00e676", borderDownColor: "#ff5252",
    wickUpColor: "#00e676", wickDownColor: "#ff5252",
    priceFormat: { type: "price", precision: digits, minMove: Math.pow(10, -digits) },
  });
  series.setData(bars.bars.map(b => ({
    time: b.time, open: b.open, high: b.high, low: b.low, close: b.close,
  })));
  chart.timeScale().fitContent();

  // Keep the chart responsive to orientation changes.
  const ro = new ResizeObserver(entries => {
    const r = entries[0]?.contentRect;
    if (r) chart.applyOptions({ width: r.width });
  });
  ro.observe(container);
}

function orderbookPanel(ob, digits) {
  const asks = (ob.depth || []).filter(d => d.side === "ask").sort((a, b) => b.price - a.price);
  const bids = (ob.depth || []).filter(d => d.side === "bid").sort((a, b) => b.price - a.price);
  const maxPct = Math.max(1, ...(ob.depth || []).map(d => d.volume_pct || 0));
  const mkRow = (d) => {
    const width = Math.max(2, (d.volume_pct / maxPct) * 100);
    return el("div", { class: "depth-row" }, [
      el("span", {

        `${d.volume_pct.toFixed(1)}% · ${d.distance_pips.toFixed(1)}пп`),

  return el("div", { class: "card", style: "padding:12px;" }, [

      el("span", null, `спред ${fmt.num(ob.spread_pips, 1)} пп`),
    ]),
    el("div", null, asks.map(mkRow)),
    el("div", { class: "depth-mid" }, [
      el("span", { style: "color:var(--sell);" }, `ASK ${ob.ask?.toFixed(digits) || "—"}`),
      el("span", { style: "color:var(--muted);" }, `MID ${ob.mid?.toFixed(digits) || "—"}`),
      el("span", { style: "color:var(--buy);" }, `BID ${ob.bid?.toFixed(digits) || "—"}`),
    ]),
    el("div", null, bids.map(mkRow)),
    (ob.supports?.length || ob.resistances?.length) ? el("div", {
      style: "margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;",
    }, [
      el("div", null, [
        el("div", { style: "color:var(--muted);font-size:10px;text-transform:uppercase;" }, "Сопротивления"),
        ...(ob.resistances?.length

          : [el("div", { style: "color:var(--muted);" }, "—")]),
      ]),
      el("div", null, [
        el("div", { style: "color:var(--muted);font-size:10px;text-transform:uppercase;" }, "Поддержки"),
        ...(ob.supports?.length
          ? ob.supports.map(s => el("div", { style: "font-family:monospace;color:var(--buy);" }, s.toFixed(digits)))
          : [el("div", { style: "color:var(--muted);" }, "—")]),
      ]),
    ]) : null,
  ]);
}

function indicatorsPanel(e) {
  const ind = e.indicators || {};
  const rows = [
    ["RSI H1", fmt.num(ind.RSI, 1)],
    ["MACD Hist", fmt.num(ind.MACD, 4)],
    ["Stoch K", fmt.num(ind.Stochastic_K, 1)],
    ["ADX H1", fmt.num(e.adx_h1, 1)],
    ["ADX H4", fmt.num(e.adx_h4, 1)],
    ["Williams %R", fmt.num(ind.Williams_R, 1)],
    ["Bollinger %B", fmt.num(ind["Bollinger_%B"], 2)],
    ["Momentum", fmt.num(ind.Momentum, 3)],
    ["EMA20", fmt.num(ind.EMA20, 5)],
    ["EMA50", fmt.num(ind.EMA50, 5)],
    ["Persist 5ч", `${e.trend_persistence_bars || 0}/5 (${fmt.num(e.trend_persistence_5h, 0)}%)`],
    ["Score", `${e.score || 0}/${e.max_score || 0}`],
  ];
  return el("div", { class: "card", style: "padding:12px;" }, [
    el("div", { style: "font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;letter-spacing:0.6px;" },
      "Индикаторы"),
    el("div", { class: "indicators-grid" }, rows.flatMap(([l, v]) => [
      el("div", { class: "ind-label" }, l),
      el("div", { class: "ind-value" }, v),
    ])),
    (e.details && e.details.length) ? el("div", { style: "margin-top:12px;" }, [
      el("div", { style: "font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;letter-spacing:0.6px;" },
        `Голосование (${e.details.length} блоков)`),
      el("ul", { class: "vote-list" }, e.details.map(d => el("li", { class: "vote-item" }, [
        el("div", null, [
          el("span", { class: "vote-name" }, d.name),
          el("span", { class: "vote-reason" }, " — " + d.reason),
        ]),
        el("span", {
          class: "vote-val",
          style: `color: ${d.value > 0 ? "var(--buy)" : d.value < 0 ? "var(--sell)" : "var(--muted)"}`,
        }, (d.value > 0 ? "+" : "") + d.value),
      ]))),
    ]) : null,
  ]);
}

/* =========================================================================
 * RENDER
 * ========================================================================= */
function render() {
  const app = document.getElementById("app");
  const route = currentRoute();

  // Update tab highlight
  document.querySelectorAll("#tabs .tab-btn").forEach(b => {
    b.classList.toggle("active",
      (route.name === "dashboard" && b.dataset.route === "dashboard") ||
      (route.name === "cycle" && b.dataset.route === "cycle"));
  });

  let view;
  if (route.name === "pair") {
    view = viewPair(route.pair);
  } else if (route.name === "cycle") {
    view = viewCycle();
  } else {
    view = viewDashboard();
  }

  app.innerHTML = "";
  app.append(view);
}

/* =========================================================================
 * BOOT
 * ========================================================================= */
document.querySelectorAll("#tabs .tab-btn").forEach(b => {
  b.addEventListener("click", () => {
    location.hash = b.dataset.route === "cycle" ? "#/cycle" : "#/";
  });
});
document.getElementById("brand-link").addEventListener("click", (e) => {
  e.preventDefault();
  location.hash = "#/";
});

// Update the cycle countdown every second so it feels live between data
// refreshes. We only touch the single countdown element, never re-render
// the whole tree.
setInterval(() => {
  const el = document.getElementById("cycle-countdown");
  if (el && state.cycle) el.textContent = fmt.countdown(computeCountdown(state.cycle));
}, 1000);

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
